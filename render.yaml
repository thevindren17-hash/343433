services:
  - type: web
    name: mister-mobile-rag-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements_free.txt
    startCommand: uvicorn api.main_free:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
